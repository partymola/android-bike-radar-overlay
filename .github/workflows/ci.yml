name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast JVM tests - runs on every push and PR. Lint and ktlint live in the
  # separate static-analysis job below so they run concurrently with this one
  # instead of serializing inside a single Gradle invocation.
  unit-tests:
    name: JVM unit tests (Robolectric)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Diff-coverage gate diffs against the base ref (PR base SHA, or the
          # push's previous main tip); full history makes that ref reachable.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Install Android SDK platform 37
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: '9.4.1'

      # Robolectric downloads its android-all-instrumented SDK jars (~100 MB
      # per API level) into ~/.m2 the first time a test runs on each level.
      # setup-gradle persists the Gradle user home but NOT ~/.m2, so without
      # this they re-download on every run. Keyed on the test build config so a
      # Robolectric-version or targetSdk bump invalidates the cache.
      - name: Cache Robolectric SDK jars
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: ~/.m2/repository/org/robolectric
          key: robolectric-m2-${{ runner.os }}-${{ hashFiles('app/build.gradle.kts') }}
          restore-keys: |
            robolectric-m2-${{ runner.os }}-

      - name: Run unit tests, screenshots, and coverage gate
        # jacocoCoverageVerification fails if testable-logic coverage drops
        # below the ratchet floor. verifyRoborazziDebug renders the Compose and
        # Canvas screenshot goldens via Robolectric Native Graphics and fails on
        # pixel drift - it runs in cold-cache CI, which Paparazzi's layoutlib
        # loader could not.
        run: gradle :app:testDebugUnitTest :app:verifyRoborazziDebug :app:jacocoCoverageVerification :app:jacocoTestReport --console=plain --no-daemon

      # Diff-coverage gate: new/changed executable production lines must clear
      # the floor, so an untested feature can't land while the project average
      # holds (the fixed jacocoCoverageVerification floor can't catch that).
      # Scope is the filtered jacocoTestReport (Compose UI + dev services already
      # excluded). A PR is gated against its base; a push against the prior main
      # tip; a tiny or unreachable-base diff passes (see the script header).
      - name: Diff-coverage gate
        run: |
          python3 -m pip install --quiet --break-system-packages diff-cover==10.3.0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          python3 scripts/diff-coverage-gate.py --base "$BASE" --fail-under 85 --min-lines 10

  # Lint + ktlint - split into its own job so it runs concurrently with the
  # test job instead of serializing behind it in one Gradle invocation.
  # lintDebug fails on any lint error; ktlintCheck fails on any violation
  # outside app/config/ktlint/baseline.xml. Neither runs Robolectric, so this
  # job needs no SDK-jar cache and only a shallow checkout.
  static-analysis:
    name: Lint and ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Install Android SDK platform 37
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: '9.4.1'

      - name: Run lint and ktlint
        run: gradle :app:lintDebug :app:ktlintCheck --console=plain --no-daemon

  # Real-APK boot smoke - runs only on pushes to main (not PRs) to avoid
  # spending 5+ minutes on an emulator for every PR iteration. It runs
  # concurrently with unit-tests rather than after it: parallelism wins ~3 min
  # of wall-clock on the common green push, at the cost of occasionally booting
  # an emulator for a push whose unit tests then fail (pushes to main are
  # almost always green, so that trade favours wall-clock).
  #
  # What this catches that the JVM suite cannot: missing manifest entries,
  # ProGuard/R8 class stripping, AndroidKeyStore first-use failures,
  # permission requests that throw at startup, immediate crashes in
  # Application or Activity onCreate that only surface on a real Dalvik/ART VM.
  #
  # What this does NOT cover: BLE (scanner is null on the stock emulator),
  # the SYSTEM_ALERT_WINDOW overlay (permission not granted automatically),
  # or any logic tested by the Robolectric suite.
  boot-smoke:
    name: APK boot smoke (API 34 emulator)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Install Android SDK platform 37
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: '9.4.1'

      - name: Build debug APK
        run: gradle :app:assembleDebug --console=plain --no-daemon

      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install APK and verify boot on Android emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a  # v2.37.0
        with:
          api-level: 34
          arch: x86_64
          # AOSP (default) target boots faster than google_apis and has no
          # Play Services dependency - sufficient for a boot-alive check.
          target: default
          # reactivecircus/android-emulator-runner runs each line of `script`
          # in its own `sh -c` invocation, so multi-line `if/then/fi` doesn't
          # survive. Each step has to stand alone or chain with `&&` / `;`.
          script: |
            set -e
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -W -n es.jjrh.bikeradar/.MainActivity
            for i in $(seq 1 15); do pid=$(adb shell pidof es.jjrh.bikeradar || true); [ -n "$pid" ] && break; sleep 1; done; if [ -z "$pid" ]; then echo "::error::App process not alive 15 s after launch - likely a boot crash"; adb logcat -d -s AndroidRuntime:E BikeRadar:E | tail -30; exit 1; fi; echo "OK: app alive at PID $pid"
