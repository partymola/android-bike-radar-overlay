name: Release APK

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  scan:
    name: Keyword scan on tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Scan tag commit message
        run: |
          regex='decompil|jadx|varia-apk|compliance[- ]checklist|legal[- ]review|DMCA|counter[- ]notice|fair[- ]use|section[- ]512|s\. ?50B|CDPA|hci[- ]snoop|btsnoop|evidence of|gratuitously|hostile surface|C3497K|C3496J|RadarMeasurementV2CharacteristicHandler|ported from|from the official app|matches the firmware|reverse[- ]engineer|clean[- ]room|black[- ]box'
          hits=$(git log -1 --format='%B' HEAD | grep -nEi "$regex" || true)
          if [ -n "$hits" ]; then
            echo "::error::Dangerous keywords in the tag's commit message"
            printf '%s\n' "$hits"
            exit 1
          fi

  build:
    name: Build + publish signed APK
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Install Android SDK platform 37
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          # Pinned to the minimum Gradle required by AGP 9.2 per
          # https://developer.android.com/build/releases/gradle-plugin .
          # Bump in lockstep with any AGP upgrade.
          gradle-version: '9.4.1'

      - name: Decode release keystore into runner temp
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --console=plain --no-daemon

      - name: Rename APK with tag
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "bike-radar-${{ github.ref_name }}.apk"

      - name: Extract CHANGELOG section for tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          awk -v tag="$TAG" '
            /^## / {
              in_section = ($2 == tag)
              next
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG section for $TAG — add a top-level ## $TAG entry before tagging"
            exit 1
          fi
          echo "----- release notes -----"
          cat release-notes.md
          echo "-------------------------"

      - name: Create GitHub Release and attach APK
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: bike-radar-${{ github.ref_name }}.apk
          body_path: release-notes.md
          # Appends "Full Changelog" compare link below body_path.
          generate_release_notes: true
          # All releases default to pre-release until the app exits
          # alpha. Flip to false (or back to dash-based detection) when
          # there's a deliberate stable cut.
          prerelease: true

      - name: Wipe keystore from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/release.keystore"
