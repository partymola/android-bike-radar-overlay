org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx3072m
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Configuration cache: serialises the task graph after the first build so
# subsequent invocations skip the configuration phase entirely. Saves about
# 2 s on every up-to-date / incremental Gradle run.
org.gradle.configuration-cache=true

# Build cache: store task outputs across builds so that switching branches
# or reverting code hits cached jars / classes instead of recompiling.
org.gradle.caching=true

# Parallel execution: marginal on a single-module project, but harmless and
# lets independent task DAG branches run concurrently.
org.gradle.parallel=true
